<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive Voice – Present & Past Simple (B2) · Verb + Word</title>
    <style>
        :root {
            --bg: #f7f5f0;
            --card-bg: #ffffff;
            --text: #2c2416;
            --accent: #5b7b94;
            --accent-light: #e8f0f6;
            --correct: #3d7a4f;
            --correct-bg: #e6f4e8;
            --incorrect: #b8433d;
            --incorrect-bg: #fce8e6;
            --border: #d9d3c9;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 10px;
            --transition: 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1e3a4f;
            margin-bottom: 0.4rem;
        }

        header .subtitle {
            font-size: 1rem;
            color: #6b5f4f;
            font-weight: 400;
        }

        header .badge {
            display: inline-block;
            background: var(--accent-light);
            color: #3a5568;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            margin-top: 0.6rem;
            letter-spacing: 0.02em;
        }

        .score-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.6rem;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1rem 1.4rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.35s ease, transform 0.35s ease;
            pointer-events: none;
        }

        .score-bar.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .score-bar .score-num {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e3a4f;
            line-height: 1;
        }

        .score-bar .score-label {
            font-size: 0.9rem;
            color: #6b5f4f;
        }

        .score-bar .score-emoji {
            font-size: 1.8rem;
        }

        .sentences-grid {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .sentence-card {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.3rem;
            box-shadow: var(--shadow);
            transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem 0.8rem;
        }

        .sentence-card.correct-flash {
            border-color: var(--correct);
            background: var(--correct-bg);
            box-shadow: 0 0 0 4px rgba(61, 122, 79, 0.08);
        }

        .sentence-card.incorrect-flash {
            border-color: var(--incorrect);
            background: var(--incorrect-bg);
            box-shadow: 0 0 0 4px rgba(184, 67, 61, 0.08);
        }

        .sentence-text {
            font-size: 1.05rem;
            font-weight: 500;
            flex: 1 1 280px;
            min-width: 200px;
            color: #2c2416;
            line-height: 1.5;
        }

        .sentence-text .blank-marker {
            display: inline-block;
            border-bottom: 2px dashed #8b7b65;
            min-width: 90px;
            text-align: center;
            margin: 0 3px;
            transition: border-color var(--transition), color var(--transition);
            font-weight: 600;
            color: #5b3e1f;
            vertical-align: middle;
        }

        .sentence-text .verb-infinitive {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: #f3f0e9;
            padding: 0.1rem 0.4rem;
            border-radius: 5px;
            font-size: 0.9rem;
            color: #3a5568;
            font-weight: 600;
            vertical-align: middle;
        }

        .sentence-card.correct-flash .blank-marker {
            border-bottom-color: var(--correct);
            color: var(--correct);
        }

        .sentence-card.incorrect-flash .blank-marker {
            border-bottom-color: var(--incorrect);
            color: var(--incorrect);
        }

        .select-wrapper {
            position: relative;
            flex: 0 0 auto;
            min-width: 180px;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            padding: 0.55rem 2.2rem 0.55rem 0.9rem;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1.5px solid #cbc1b2;
            border-radius: 7px;
            background: #fdfcf9;
            color: #2c2416;
            cursor: pointer;
            transition: border-color var(--transition), box-shadow var(--transition);
            font-weight: 500;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91, 123, 148, 0.13);
        }

        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 0.7rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #8b7b65;
            font-size: 0.85rem;
            transition: color var(--transition);
        }

        .feedback-icon {
            font-size: 1.2rem;
            min-width: 1.4rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.25s ease;
            flex: 0 0 auto;
        }

        .feedback-icon.show {
            opacity: 1;
        }

        .feedback-icon.correct-icon {
            color: var(--correct);
        }

        .feedback-icon.incorrect-icon {
            color: var(--incorrect);
        }

        .button-row {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.7rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-check {
            background: #3a5568;
            color: #fff;
            box-shadow: 0 3px 12px rgba(58, 85, 104, 0.25);
        }

        .btn-check:hover {
            background: #2e4555;
            box-shadow: 0 5px 18px rgba(58, 85, 104, 0.35);
        }

        .btn-reset {
            background: #fff;
            color: #3a5568;
            border: 2px solid #cbc1b2;
        }

        .btn-reset:hover {
            background: #f7f5f0;
            border-color: #a89b87;
        }

        .summary-message {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 1rem;
            font-weight: 500;
            color: #4a3f30;
            min-height: 1.5em;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
            .sentence-card {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
                padding: 1rem;
            }
            .select-wrapper {
                min-width: 100%;
            }
            .feedback-icon {
                align-self: flex-end;
                margin-top: -0.3rem;
            }
            .sentence-text {
                flex: 1 1 auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Passive Voice – Word Choice</h1>
            <p class="subtitle">Verb in brackets (infinitive) · Choose the correct word</p>
            <span class="badge">B2 Level · Present & Past Simple Passive</span>
        </header>

        <div class="score-bar" id="scoreBar">
            <span class="score-emoji" id="scoreEmoji">📊</span>
            <span class="score-num" id="scoreNum">0/25</span>
            <span class="score-label" id="scoreLabel">Check your answers!</span>
        </div>

        <div class="sentences-grid" id="sentencesGrid"></div>

        <div class="button-row">
            <button class="btn btn-check" id="btnCheck">✅ Check Answers</button>
            <button class="btn btn-reset" id="btnReset">🔄 Reset</button>
        </div>
        <p class="summary-message" id="summaryMsg"></p>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // SENTENCE DATA — verb infinitive in brackets, blank for the word
            // textBefore + BLANK + textAfter
            // Verb is shown as <span class="verb-infinitive">(infinitive)</span>
            // ──────────────────────────────────────
            const sentences = [{
                id: 1,
                textBefore: 'The ship <span class="verb-infinitive">(steer)</span> by a large ',
                textAfter: '.',
                correct: 'rudder',
                options: ['rudder', 'screw', 'latch', 'cart']
            }, {
                id: 2,
                textBefore: 'An ',
                textAfter: ' <span class="verb-infinitive">(open)</span> when it starts raining.',
                correct: 'umbrella',
                options: ['umbrella', 'apron', 'ponytail', 'dessert']
            }, {
                id: 3,
                textBefore: 'The dog <span class="verb-infinitive">(walk)</span> on a ',
                textAfter: ' through the park.',
                correct: 'leash',
                options: ['leash', 'rope', 'screw', 'latch']
            }, {
                id: 4,
                textBefore: '',
                textAfter: ' <span class="verb-infinitive">(pay)</span> by the residents at the end of each month.',
                correct: 'Utilities',
                options: ['Utilities', 'Tools', 'Supplies', 'Bulk products']
            }, {
                id: 5,
                textBefore: 'The heavy box <span class="verb-infinitive">(tie)</span> with a thick ',
                textAfter: '.',
                correct: 'rope',
                options: ['rope', 'leash', 'ponytail', 'apron']
            }, {
                id: 6,
                textBefore: 'A metal ',
                textAfter: ' <span class="verb-infinitive">(insert)</span> into the wall by the builder.',
                correct: 'screw',
                options: ['screw', 'latch', 'rudder', 'cart']
            }, {
                id: 7,
                textBefore: 'All equipment <span class="verb-infinitive">(stow)</span> ',
                textAfter: ' before the plane takes off.',
                correct: 'stowed',
                options: ['stowed', 'loosened', 'gathered', 'kicked']
            }, {
                id: 8,
                textBefore: '',
                textAfter: ' <span class="verb-infinitive">(transport)</span> across the ocean by large cargo ships.',
                correct: 'Bulk products',
                options: ['Bulk products', 'Lost items', 'Loose items', 'Utilities']
            }, {
                id: 9,
                textBefore: '',
                textAfter: ' <span class="verb-infinitive">(discover)</span> under the seat by the cleaner.',
                correct: 'Lost items',
                options: ['Lost items', 'Bulk products', 'Tools', 'Supplies']
            }, {
                id: 10,
                textBefore: '',
                textAfter: ' <span class="verb-infinitive">(keep)</span> in the overhead compartment during the flight.',
                correct: 'Loose items',
                options: ['Loose items', 'Lost items', 'Bulk products', 'Utilities']
            }, {
                id: 11,
                textBefore: 'The tight knot <span class="verb-infinitive">(loosen)</span> ',
                textAfter: ' by the experienced climber.',
                correct: 'loosened',
                options: ['loosened', 'stowed', 'gathered', 'kicked']
            }, {
                id: 12,
                textBefore: 'The ripe fruit <span class="verb-infinitive">(gather)</span> ',
                textAfter: ' from the trees by the farmers.',
                correct: 'gathered',
                options: ['gathered', 'loosened', 'stowed', 'discovered']
            }, {
                id: 13,
                textBefore: 'A warning <span class="verb-infinitive">(post)</span> ',
                textAfter: ' on the entrance door.',
                correct: 'notice',
                options: ['notice', 'latch', 'screw', 'cart']
            }, {
                id: 14,
                textBefore: 'The heavy ',
                textAfter: ' <span class="verb-infinitive">(push)</span> through the narrow aisle.',
                correct: 'cart',
                options: ['cart', 'latch', 'rudder', 'screw']
            }, {
                id: 15,
                textBefore: 'The door <span class="verb-infinitive">(kick)</span> ',
                textAfter: ' open by the police officers.',
                correct: 'kicked',
                options: ['kicked', 'stowed', 'gathered', 'loosened']
            }, {
                id: 16,
                textBefore: 'The parking lot <span class="verb-infinitive">(situate)</span> ',
                textAfter: ' the shopping centre.',
                correct: 'behind',
                options: ['behind', 'suddenly', 'rapid', 'singular']
            }, {
                id: 17,
                textBefore: 'The gate <span class="verb-infinitive">(secure)</span> with a heavy ',
                textAfter: '.',
                correct: 'latch',
                options: ['latch', 'cart', 'rudder', 'screw']
            }, {
                id: 18,
                textBefore: 'All the necessary ',
                textAfter: ' <span class="verb-infinitive">(organize)</span> on the workbench.',
                correct: 'tools',
                options: ['tools', 'supplies', 'utilities', 'bulk products']
            }, {
                id: 19,
                textBefore: 'Emergency ',
                textAfter: ' <span class="verb-infinitive">(deliver)</span> to the disaster zone.',
                correct: 'supplies',
                options: ['supplies', 'tools', 'utilities', 'loose items']
            }, {
                id: 20,
                textBefore: 'A clean white ',
                textAfter: ' <span class="verb-infinitive">(wear)</span> by all kitchen staff.',
                correct: 'apron',
                options: ['apron', 'umbrella', 'ponytail', 'leash']
            }, {
                id: 21,
                textBefore: 'Visitors <span class="verb-infinitive">(not allow)</span> ',
                textAfter: ' to enter the restricted area.',
                correct: 'allowed',
                options: ['allowed', 'discovered', 'tripped over', 'kicked']
            }, {
                id: 22,
                textBefore: 'The electrical cable <span class="verb-infinitive">(trip over)</span> ',
                textAfter: ' by a careless pedestrian.',
                correct: 'tripped over',
                options: ['tripped over', 'kicked', 'discovered', 'allowed']
            }, {
                id: 23,
                textBefore: 'An ancient city <span class="verb-infinitive">(discover)</span> ',
                textAfter: ' by a team of archaeologists.',
                correct: 'discovered',
                options: ['discovered', 'tripped over', 'kicked', 'loosened']
            }, {
                id: 24,
                textBefore: 'Her long hair <span class="verb-infinitive">(tie)</span> in a neat ',
                textAfter: '.',
                correct: 'ponytail',
                options: ['ponytail', 'apron', 'umbrella', 'leash']
            }, {
                id: 25,
                textBefore: 'The Sahara <span class="verb-infinitive">(know)</span> ',
                textAfter: ' for its extreme heat.',
                correct: 'desert',
                options: ['desert', 'dessert', 'notice', 'cart']
            }];

            const grid = document.getElementById('sentencesGrid');
            const scoreBar = document.getElementById('scoreBar');
            const scoreNum = document.getElementById('scoreNum');
            const scoreLabel = document.getElementById('scoreLabel');
            const scoreEmoji = document.getElementById('scoreEmoji');
            const summaryMsg = document.getElementById('summaryMsg');
            const btnCheck = document.getElementById('btnCheck');
            const btnReset = document.getElementById('btnReset');

            let checked = false;

            function buildSentences() {
                grid.innerHTML = '';
                sentences.forEach((s) => {
                    const card = document.createElement('div');
                    card.className = 'sentence-card';
                    card.setAttribute('data-sentence-id', s.id);

                    const textSpan = document.createElement('span');
                    textSpan.className = 'sentence-text';
                    const blankHTML = '<span class="blank-marker" data-blank-id="' + s.id + '">________</span>';
                    const fullHTML = s.textBefore + ' ' + blankHTML + ' ' + s.textAfter;
                    textSpan.innerHTML = fullHTML;

                    const selectWrapper = document.createElement('span');
                    selectWrapper.className = 'select-wrapper';
                    const select = document.createElement('select');
                    select.setAttribute('data-sentence-id', s.id);
                    select.setAttribute('data-correct', s.correct);
                    s.options.forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.textContent = opt;
                        select.appendChild(option);
                    });
                    const defaultOpt = document.createElement('option');
                    defaultOpt.value = '';
                    defaultOpt.textContent = '— choose —';
                    defaultOpt.selected = true;
                    defaultOpt.disabled = true;
                    select.insertBefore(defaultOpt, select.firstChild);

                    selectWrapper.appendChild(select);

                    const feedbackIcon = document.createElement('span');
                    feedbackIcon.className = 'feedback-icon';
                    feedbackIcon.setAttribute('data-feedback-id', s.id);

                    card.appendChild(textSpan);
                    card.appendChild(selectWrapper);
                    card.appendChild(feedbackIcon);
                    grid.appendChild(card);

                    select.addEventListener('change', function() {
                        if (checked) return;
                        const blankMarker = card.querySelector('.blank-marker');
                        if (this.value) {
                            blankMarker.textContent = this.value;
                            blankMarker.style.color = '#3a5568';
                            blankMarker.style.borderBottomColor = '#5b7b94';
                        } else {
                            blankMarker.textContent = '________';
                            blankMarker.style.color = '#5b3e1f';
                            blankMarker.style.borderBottomColor = '#8b7b65';
                        }
                    });
                });
            }

            function resetAll() {
                checked = false;
                const allCards = grid.querySelectorAll('.sentence-card');
                allCards.forEach(card => {
                    card.classList.remove('correct-flash', 'incorrect-flash');
                    const select = card.querySelector('select');
                    select.value = '';
                    const blankMarker = card.querySelector('.blank-marker');
                    blankMarker.textContent = '________';
                    blankMarker.style.color = '#5b3e1f';
                    blankMarker.style.borderBottomColor = '#8b7b65';
                    const feedbackIcon = card.querySelector('.feedback-icon');
                    feedbackIcon.classList.remove('show', 'correct-icon', 'incorrect-icon');
                    feedbackIcon.textContent = '';
                    const hint = blankMarker.querySelector('.correct-hint');
                    if (hint) hint.remove();
                });
                scoreBar.classList.remove('visible');
                summaryMsg.textContent = '';
                scoreNum.textContent = '0/25';
                scoreLabel.textContent = 'Check your answers!';
                scoreEmoji.textContent = '📊';
            }

            function checkAnswers() {
                checked = true;
                let correctCount = 0;
                const total = sentences.length;
                const allCards = grid.querySelectorAll('.sentence-card');
                allCards.forEach(card => {
                    const select = card.querySelector('select');
                    const correctVal = select.getAttribute('data-correct');
                    const selectedVal = select.value;
                    const blankMarker = card.querySelector('.blank-marker');
                    const feedbackIcon = card.querySelector('.feedback-icon');
                    card.classList.remove('correct-flash', 'incorrect-flash');
                    feedbackIcon.classList.remove('show', 'correct-icon', 'incorrect-icon');
                    const existingHint = blankMarker.querySelector('.correct-hint');
                    if (existingHint) existingHint.remove();

                    if (selectedVal === correctVal) {
                        card.classList.add('correct-flash');
                        feedbackIcon.classList.add('show', 'correct-icon');
                        feedbackIcon.textContent = '✓';
                        blankMarker.textContent = selectedVal;
                        blankMarker.style.color = '#3d7a4f';
                        blankMarker.style.borderBottomColor = '#3d7a4f';
                        correctCount++;
                    } else {
                        card.classList.add('incorrect-flash');
                        feedbackIcon.classList.add('show', 'incorrect-icon');
                        feedbackIcon.textContent = '✗';
                        blankMarker.textContent = selectedVal || '________';
                        blankMarker.style.color = '#b8433d';
                        blankMarker.style.borderBottomColor = '#b8433d';
                        const hint = document.createElement('span');
                        hint.className = 'correct-hint';
                        hint.style.cssText = 'font-size:0.8rem;color:#3d7a4f;font-weight:600;margin-left:4px;';
                        hint.textContent = '→ ' + correctVal;
                        blankMarker.appendChild(hint);
                    }
                });

                scoreBar.classList.add('visible');
                scoreNum.textContent = correctCount + '/' + total;
                const percentage = Math.round((correctCount / total) * 100);
                if (percentage >= 90) {
                    scoreEmoji.textContent = '🏆';
                    scoreLabel.textContent = 'Excellent!';
                } else if (percentage >= 70) {
                    scoreEmoji.textContent = '👍';
                    scoreLabel.textContent = 'Good job!';
                } else if (percentage >= 50) {
                    scoreEmoji.textContent = '📚';
                    scoreLabel.textContent = 'Keep practicing!';
                } else {
                    scoreEmoji.textContent = '💪';
                    scoreLabel.textContent = 'Review the rules and try again.';
                }

                if (percentage === 100) {
                    summaryMsg.textContent = '🎉 Perfect! You matched all the words correctly.';
                } else if (percentage >= 80) {
                    summaryMsg.textContent = '🌟 Nearly there! Check the hints and try again.';
                } else {
                    summaryMsg.textContent = '📘 Remember: the verb in brackets shows the action; choose the right word to complete the passive sentence.';
                }
            }

            btnCheck.addEventListener('click', function() {
                const allSelects = grid.querySelectorAll('select');
                let anySelected = false;
                allSelects.forEach(s => { if (s.value) anySelected = true; });
                if (!anySelected && !checked) {
                    summaryMsg.textContent = '⚠️ Please select at least one word before checking.';
                    return;
                }
                checkAnswers();
            });

            btnReset.addEventListener('click', resetAll);

            buildSentences();
        })();
    </script>
</body>
</html>
